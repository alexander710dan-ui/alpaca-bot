name: drift-monitor
on:
  schedule:
    - cron: '0 22 * * 5'        # weekly, Friday after the close — fails loudly on strategy drift
  workflow_dispatch: {}
jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: live-vs-engine tracking check
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python drift_monitor.py
