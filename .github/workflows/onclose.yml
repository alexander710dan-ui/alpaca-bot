name: burst-onclose
on:
  schedule:                     # three slots aimed EARLY (observed GH drift ~+60min): targets
    - cron: '25 18 * * 1-5'     # 14:25/14:45/15:05 ET so drifted runs land inside the
    - cron: '45 18 * * 1-5'     # 15:00-15:50 ET window; outside it runs no-op and the
    - cron: '5 19 * * 1-5'      # next-morning bot remains the fallback
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: onclose
  cancel-in-progress: false
jobs:
  onclose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet -r requirements.txt pytest
      - name: safety tests
        run: python -m pytest -q tests/
      - name: burst entry at the close (CLS order, paper)
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python crypto_bot.py --onclose
      - name: push log
        if: always()
        run: |
          git config user.name "onclose-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash -q || true
          git add -f moon.log
          git diff --cached --quiet || git commit -q -m "onclose run $(date -u '+%F %H:%M')Z"
          git push -q || true
