name: moe-v8-bot
on:
  schedule:                    # staggered: GH cron fires 1-2.5h late; first run that lands
    - cron: '40 13 * * 1-5'     # near the open (9:40 ET summer) does the work, later ones
    - cron: '10 14 * * 1-5'     # no-op via rebalance band + client-order-id dedup
    - cron: '5 15 * * 1-5'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: moe
  cancel-in-progress: false
jobs:
  moe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet -r requirements.txt pytest
      - name: safety tests (must pass or no orders are placed today)
        run: python -m pytest -q tests/
      - name: run MoE v10 bot at 2x (paper)
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python moe_bot.py
      - name: shadow accounting (1x/2x/5x, $100k & $10k)
        if: always()
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python shadow.py
      - name: tracker (append daily history for the live dashboard)
        if: always()
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python tracker.py
      - name: push log
        if: always()
        run: |
          git config user.name "moe-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash -q || true
          git add -f moe.log shadow_state.json moe_history.json
          git diff --cached --quiet || git commit -q -m "moe v8 run $(date -u '+%F %H:%M')Z"
          git push -q || true
