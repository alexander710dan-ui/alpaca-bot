name: moe-v8-bot
on:
  schedule:
    - cron: '5 15 * * 1-5'      # once a trading day, ~11am ET (market open)
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: moe
  cancel-in-progress: false
jobs:
  moe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet alpaca-py
      - name: run MoE v8 bot at 2x (paper)
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python moe_bot.py
      - name: shadow accounting (1x/2x/5x, $100k & $10k)
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python shadow.py
      - name: push log
        run: |
          git config user.name "moe-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash -q || true
          git add -f moe.log shadow_state.json
          git diff --cached --quiet || git commit -q -m "moe v8 run $(date -u '+%F %H:%M')Z"
          git push -q || true
