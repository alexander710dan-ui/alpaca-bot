name: trading-bot
on:
  schedule:
    # every 15 min during US market hours, in UTC (13:30-20:00 = 9:30am-4pm ET, summer).
    # offset minutes avoid GitHub's top-of-hour congestion. is_open check handles the edges.
    - cron: '2,17,32,47 13-20 * * 1-5'
  workflow_dispatch: {}        # lets us run it manually too
permissions:
  contents: write
concurrency:
  group: bot
  cancel-in-progress: false
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet alpaca-py
      - name: run the bot (one check)
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python alpaca_bot.py
      - name: push logs back to repo
        run: |
          git config user.name "alpaca-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash -q || true
          git add -f bot.log status.json
          git diff --cached --quiet || git commit -q -m "actions run $(date -u '+%F %H:%M')Z"
          git push -q || true
