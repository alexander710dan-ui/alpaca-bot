name: trading-bot (RETIRED — superseded by moe.yml / v8)
on:
  # schedule DISABLED 2026-06-30: replaced by the MoE v8 bot (moe_bot.py via putwrite.yml).
  # Leaving manual trigger only so it never auto-trades and double-books the paper account.
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: bot
  cancel-in-progress: false
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet alpaca-py
      - name: run the bot (one check)
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python alpaca_bot.py
      - name: push logs back to repo
        run: |
          git config user.name "alpaca-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash -q || true
          git add -f bot.log status.json
          git diff --cached --quiet || git commit -q -m "actions run $(date -u '+%F %H:%M')Z"
          git push -q || true
